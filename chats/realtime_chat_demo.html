<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat - sand111 Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        .setup-card { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .setup-card h2 { color: #667eea; margin-bottom: 15px; }
        .setup-card input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .setup-card button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .setup-card button:hover { background: #5568d3; }
        .setup-card .status { padding: 10px; margin-top: 10px; border-radius: 5px; text-align: center; font-weight: bold; }
        .setup-card .status.success { background: #d4edda; color: #155724; }
        .setup-card .status.error { background: #f8d7da; color: #721c24; }
        .setup-card .status.info { background: #d1ecf1; color: #0c5460; }
        
        .chat-container { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); height: 600px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        
        .chat-header { padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 20px; }
        .chat-header .online-status { font-size: 12px; opacity: 0.9; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { margin-bottom: 15px; display: flex; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-bubble { max-width: 60%; padding: 12px 16px; border-radius: 18px; position: relative; }
        .message.sent .message-bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: white; border: 1px solid #e0e0e0; color: #333; border-bottom-left-radius: 4px; }
        
        .message-text { margin-bottom: 5px; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.7; text-align: right; }
        
        .typing-indicator { padding: 10px 20px; color: #667eea; font-style: italic; font-size: 14px; min-height: 30px; }
        
        .input-container { padding: 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; background: white; border-radius: 0 0 15px 15px; }
        .input-container input { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 25px; outline: none; font-size: 14px; }
        .input-container input:focus { border-color: #667eea; }
        .input-container button { padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .input-container button:hover { transform: scale(1.05); }
        
        .helper-text { font-size: 12px; color: #666; margin-top: 5px; }
        .code-block { background: #f4f4f4; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; margin: 10px 0; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Card -->
        <div class="setup-card" id="setupCard">
            <h2>🔥 Firebase Real-time Chat Setup</h2>
            <p class="helper-text">Your project: <strong>sand111</strong></p>
            
            <div id="configSection">
                <h3 style="margin-top: 20px; color: #333;">Step 1: Get Firebase Web Config</h3>
                <p class="helper-text">Go to <a href="https://console.firebase.google.com/project/sand111/settings/general" target="_blank">Firebase Console</a> → Your apps → Web app → Copy config</p>
                
                <input type="text" id="apiKey" placeholder="API Key (AIzaSyC...)">
                <input type="text" id="messagingSenderId" placeholder="Messaging Sender ID">
                <input type="text" id="appId" placeholder="App ID (1:123:web:abc)">
                
                <div class="code-block">
                    <strong>Database URL:</strong> https://sand111-default-rtdb.firebaseio.com<br>
                    <strong>Project ID:</strong> sand111
                </div>
                
                <button onclick="initializeFirebase()">🚀 Initialize Firebase</button>
            </div>
            
            <div id="chatSetupSection" style="display: none;">
                <h3 style="margin-top: 20px; color: #333;">Step 2: Start Chat</h3>
                <input type="number" id="chatId" placeholder="Chat ID (e.g., 1)">
                <input type="number" id="userId" placeholder="Your User ID">
                <button onclick="startChat()">💬 Start Chat</button>
            </div>
            
            <div id="statusMessage"></div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-header">
                <div>
                    <h2>Chat #<span id="chatIdDisplay"></span></h2>
                    <div class="online-status">Real-time • No refresh needed ✅</div>
                </div>
                <button onclick="backToSetup()" style="background: rgba(255,255,255,0.2); padding: 8px 15px; border: none; border-radius: 5px; color: white; cursor: pointer;">← Back</button>
            </div>
            
            <div class="messages-container" id="messages"></div>
            
            <div class="typing-indicator" id="typing"></div>
            
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Type a message..." />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="firebase_realtime_chat.js"></script>
    <script>
        let chat = null;
        let currentChatId = null;
        let currentUserId = null;

        // Initialize Firebase
        async function initializeFirebase() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const messagingSenderId = document.getElementById('messagingSenderId').value.trim();
            const appId = document.getElementById('appId').value.trim();
            
            if (!apiKey || !messagingSenderId || !appId) {
                showStatus('Please fill all fields', 'error');
                return;
            }

            // const firebaseConfig = {
            //     apiKey: apiKey,
            //     authDomain: "sand111.firebaseapp.com",
            //     databaseURL: "https://sand111-default-rtdb.firebaseio.com",
            //     projectId: "sand111",
            //     storageBucket: "sand111.appspot.com",
            //     messagingSenderId: messagingSenderId,
            //     appId: appId
            // };

            //   const firebaseConfig = {
            //         apiKey: "AIzaSyC-sTC9R3Tmh-KEdGQUQBWiyaIuu5oBlqk",
            //         authDomain: "staymate-chat-test.firebaseapp.com",
            //         databaseURL: "https://staymate-chat-test-default-rtdb.asia-southeast1.firebasedatabase.app",
            //         projectId: "staymate-chat-test",
            //         storageBucket: "staymate-chat-test.firebasestorage.app",
            //         messagingSenderId: "954862025856",
            //         appId: "1:954862025856:web:8e3f00eb04c6122dd33a65",
            //         measurementId: "G-EJ1HG6ZJ14"
            //         };
            
                   const firebaseConfig = {
                apiKey: "AIzaSyC75jVwyAQ_shMjLgZMYmROiJZlm6nUtEE",
                authDomain: "sand111.firebaseapp.com",
                databaseURL: "https://sand111.firebaseio.com",
                projectId: "sand111",
                storageBucket: "sand111.appspot.com",
                messagingSenderId: "470305805596",
                appId: "1:470305805596:web:66277e52804e129f8dd6d9",
                measurementId: "G-918Y9ME9CJ"
            };

            showStatus('Initializing Firebase...', 'info');

            chat = new FirebaseRealtimeChat();
            const success = await chat.init(firebaseConfig);

            if (success) {
                showStatus('✅ Firebase connected successfully!', 'success');
                document.getElementById('configSection').style.display = 'none';
                document.getElementById('chatSetupSection').style.display = 'block';
            } else {
                showStatus('❌ Failed to connect. Check console for errors.', 'error');
            }
        }

        // Start chat
        function startChat() {
            currentChatId = document.getElementById('chatId').value;
            currentUserId = document.getElementById('userId').value;

            if (!currentChatId || !currentUserId) {
                showStatus('Please enter Chat ID and User ID', 'error');
                return;
            }

            chat.setUser(currentUserId);
            
            // Set online status
            chat.setOnlineStatus(true);

            // Listen to messages (REAL-TIME!)
            chat.listenToMessages(currentChatId, (messages) => {
                displayMessages(messages);
            });

            // Listen to typing
            chat.listenToTyping(currentChatId, (typingData) => {
                const typingDiv = document.getElementById('typing');
                const otherUserTyping = Object.keys(typingData).find(uid => uid != currentUserId && typingData[uid]?.typing);
                typingDiv.textContent = otherUserTyping ? 'Typing...' : '';
            });

            // Show chat UI
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            document.getElementById('chatIdDisplay').textContent = currentChatId;
        }

        // Display messages
        function displayMessages(messages) {
            console.log('📱 Displaying messages:', messages);
            
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No messages yet. Start chatting!</div>';
                return;
            }
            
            messages.forEach(msg => {
                console.log('💬 Message:', msg);
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.sender_id == currentUserId ? 'sent' : 'received'}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                
                const text = document.createElement('div');
                text.className = 'message-text';
                text.textContent = msg.message;
                
                const time = document.createElement('div');
                time.className = 'message-time';
                time.textContent = formatTime(msg.timestamp);
                
                bubble.appendChild(text);
                bubble.appendChild(time);
                messageDiv.appendChild(bubble);
                container.appendChild(messageDiv);
            });
            
            container.scrollTop = container.scrollHeight;
            console.log('✅ Messages displayed');
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const messageId = await chat.sendMessage(currentChatId, message);
            
            if (messageId) {
                input.value = '';
                chat.setTyping(currentChatId, false);
            }
        }

        // Typing indicator
        let typingTimeout;
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('messageInput');
            if (input) {
                input.addEventListener('input', () => {
                    if (chat) {
                        chat.setTyping(currentChatId, true);
                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            chat.setTyping(currentChatId, false);
                        }, 1000);
                    }
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
            }
        });

        // Back to setup
        function backToSetup() {
            if (chat) {
                chat.stopAllListeners();
                chat.setOnlineStatus(false);
            }
            document.getElementById('setupCard').style.display = 'block';
            document.getElementById('chatContainer').classList.remove('active');
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }

        // Format time
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (chat) {
                chat.setOnlineStatus(false);
                chat.stopAllListeners();
            }
        });
    </script>
</body>
</html>
